jenkins:
  clouds:
    - operationsCenterAgentProvisioningService
  systemMessage: |
    Configured automatically by CloudBees Configuration as Code for Controllers (${bundleName})
    
    Java: ${java.version}

kube:
  podTemplatesConfiguration:
    templates:
    - label: "agent"
      nodeSelector: "jenkins=agent"
      showRawYaml: false
      yamlMergeStrategy: "override"
    - containers:
      - args: "9999999"
        command: "sleep"
        image: "maven:3.9.6-amazoncorretto-17-debian-bookworm"
        livenessProbe:
          failureThreshold: 0
          initialDelaySeconds: 0
          periodSeconds: 0
          successThreshold: 0
          timeoutSeconds: 0
        name: "maven"
        workingDir: "/home/jenkins/agent"
      label: "JAVA-17-396"
      name: "JAVA-17-396"
      yamlMergeStrategy: "override"

security:
  gitHostKeyVerificationConfiguration:
    sshHostKeyVerificationStrategy: "acceptFirstConnectionStrategy"

tool:
  cloudbeesPluginUsageAnalyzer:
    enabled: true
    
appearance:
  themeManager:
    disableUserThemes: true
    theme: "darkSystem"
unclassified:
  bundleUpdateTiming:
    automaticReload: true
  cascItemsConfiguration:
    variableInterpolationEnabledForAdmin: true
  globalLibraries:
    libraries:
      - allowVersionOverride: true
        defaultVersion: "main"
        implicit: false
        includeInChangesets: false
        name: "shared-libs"
        retriever:
          modernSCM:
            clone: true
            scm:
              gitSource:
                credentialsId: "gh-api"
                remote: "https://github.com/jayvirtanen/jenkins-shared-libs"
  globalUntrustedLibraries:
    libraries:
      - allowVersionOverride: true
        defaultVersion: "main"
        implicit: false
        includeInChangesets: false
        name: "pipeline-untrusted"
        retriever:
          modernSCM:
            clone: true
            scm:
              gitSource:
                credentialsId: "gh-api"
                remote: "https://github.com/jayvirtanen/jenkins-shared-libs"
  gitHubPluginConfig:
    configs:
      - credentialsId: "gh-api"
        name: "GitHub"
    hookUrl: "$JENKINS_BASE_URL/github-webhook/"
  provisioningLimitConfiguration:
    limit:
      executors: 50
      nodes: 50
  usageStatisticsCloudBees:
    disabledJenkinsUsageStatistics: true
    usageStatisticsCollected: false
